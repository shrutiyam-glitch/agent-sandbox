# autoscalingmetric-controller.yaml
apiVersion: autoscaling.gke.io/v1beta1
kind: AutoscalingMetric
metadata:
  name: agent-active-claim-rate
  namespace: sandbox-test
spec:
  metrics:
  - pod:
      selector:
        matchLabels:
          app: agent-sandbox-workload
      containers:
      - endpoint:
          port: 9091                  # Must match the --port arg in your sidecar
          path: /metrics
        metrics:
          - gauge:
              name: agent_sandbox_claim_per_minute
              prometheusMetricName: "agent_sandbox_claim_per_minute"
                
