apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-warmpool-hpa
  namespace: agent-sandbox-system #sandbox-test
spec:
  scaleTargetRef:
    apiVersion: extensions.agents.x-k8s.io/v1alpha1
    kind: SandboxWarmPool
    name: python-sdk-warmpool 
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: autoscaling.gke.io|agent-active-claim-rate|agent_sandbox_claim_per_minute # Matches the metric name exposed by AutoscalingMetric
        target:
          type: AverageValue
          averageValue: 2
