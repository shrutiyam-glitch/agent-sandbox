# The number of namespaces to create and spread the test load across.
{{$namespaces := DefaultParam .CL2_NAMESPACES 1}}
# The maximum rate (Queries Per Second) for cluster loader to create objects during test phases.
{{$qps := DefaultParam .CL2_QPS 50}}
# The target number of pre-warmed, ready sandboxes to maintain in the warm pool.
{{$warmpool_size := DefaultParam .CL2_WARMPOOL_SIZE 200}}
# The duration of the test in seconds.
{{$durationSeconds := DefaultParam .CL2_DURATION_SECONDS 150}}
# The number of new SandboxClaims to create during each burst iteration.
{{$burstSize := MultiplyInt $qps $durationSeconds}}
# The prefix used for naming the test namespaces (e.g., "agent-sandbox-1").
{{$namespacePrefix := DefaultParam .CL2_NAMESPACE_PREFIX "agent-sandbox"}}
# The total number of burst iterations to execute in the test.
{{$totalBursts := DefaultParam .CL2_TOTAL_BURSTS 100}}
{{$runtimeClass := DefaultParam .CL2_RUNTIME_CLASS "gvisor"}}

name: agent-sandbox-continuous-burst
namespace:
  number: {{$namespaces}}
  prefix: {{$namespacePrefix}}
tuningSets:
- name: BurstCreate
  qpsLoad:
    qps: {{$qps}}

steps:
- name: Start Startup Latency Measurement
  measurements:
  - Identifier: SandboxStartupLatency
    Method: PodStartupLatency
    Params:
      action: start
      labelSelector: "app=agent-sandbox-load-test"
  - Identifier: SandboxClaimStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: start
      metricName: Agent Sandbox Claim Startup Latency (ms)
      metricVersion: v1
      unit: ms
      queries:
        - name: StartupLatency50
          query: histogram_quantile(0.50, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000  # Equivalent to 1s
          requireSamples: true
        - name: StartupLatency90
          query: histogram_quantile(0.90, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000  # Equivalent to 1s
          requireSamples: true
        - name: StartupLatency99
          query: histogram_quantile(0.99, sum(rate(agent_sandbox_claim_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 5000  # Equivalent to 5s
          requireSamples: true
  - Identifier: SandboxClaimControllerStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: start
      metricName: Agent Sandbox Claim Controller Startup Latency (ms)
      metricVersion: v1
      unit: ms
      queries:
        - name: ControllerStartupLatency50
          query: histogram_quantile(0.50, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000
          requireSamples: true
        - name: ControllerStartupLatency90
          query: histogram_quantile(0.90, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 1000
          requireSamples: true
        - name: ControllerStartupLatency99
          query: histogram_quantile(0.99, sum(rate(agent_sandbox_claim_controller_startup_latency_ms_bucket{}[%v])) by (le))
          threshold: 5000
          requireSamples: true

- name: Setup Sandbox Template
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: template
      objectTemplatePath: templates/cluster-loader-sandbox-template.yaml
      templateFillMap:
        LatencyType: rapid-burst
        # RuntimeClass: {{$runtimeClass}}

- name: Setup Sandbox Warm Pool
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 1
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool
      objectTemplatePath: templates/cluster-loader-warmpool.yaml
      templateFillMap:
        TemplateName: template-0
        Replicas: {{$warmpool_size}}

- name: Setup Capacity Buffer and HPA  
  phases:  
  - namespaceRange: {min: 1, max: {{$namespaces}}}  
    replicasPerNamespace: 1  
    tuningSet: BurstCreate  
    objectBundle:  
    - basename: capacity-buffer  
      objectTemplatePath: templates/cluster-loader-capacity-buffer.yaml  
      templateFillMap:  
        Percentage: 200  
        WarmPoolName: warmpool-0  
        ProvisioningStrategy: buffer.gke.io/standby-capacity 
    - basename: hpa  
      objectTemplatePath: templates/cluster-loader-hpa.yaml  
      templateFillMap:  
        WarmPoolName: warmpool-0  
        MinReplicas: 200
        MaxReplicas: 1500  
        MetricName: prometheus.googleapis.com|agent_sandbox_claim_creation_total|counter  
        TargetValue: 0.2

- name: Pause 60 Seconds After Capacity Buffer and HPA Setup
  measurements:
  - Identifier: WaitAfterCapacityBufferAndHpaSetup
    Method: Sleep
    Params:
      duration: 60s

- name: Wait for Warm Pool Sandboxes to be Ready
  measurements:
  - Identifier: WaitForWarmPoolSandboxes
    Method: WaitForGenericK8sObjects
    Params:
      action: start
      objectGroup: "agents.x-k8s.io"
      objectVersion: "v1alpha1"
      objectResource: "sandboxes"
      labelSelector: "agents.x-k8s.io/warm-pool-sandbox"
      namespaceRange: {min: 1, max: {{$namespaces}}}
      successfulConditions: ["Ready=True"]
      failedConditions: []
      minDesiredObjectCount: {{MultiplyInt $warmpool_size $namespaces}}
      maxFailedObjectCount: 0
      timeout: 15m

- name: Pause 4 Minutes for extra nodes to be provisioned by CSN and go to suspend state
  measurements:
  - Identifier: WaitAfterCapacityBufferAndHpaSetup
    Method: Sleep
    Params:
      duration: 4m

- name: Create Continuous Burst Sandbox Claims ({{$burstSize}})
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: {{$burstSize}}
    tuningSet: BurstCreate
    objectBundle:
    - basename: agent-claim
      objectTemplatePath: templates/cluster-loader-sandbox-claim.yaml
      templateFillMap:
        TemplateName: template-0

- name: Wait for Continuous Burst Sandbox Claims to be Ready
  measurements:
  - Identifier: WaitForContinuousBurstSandboxClaims
    Method: WaitForGenericK8sObjects
    Params:
      action: start
      objectGroup: extensions.agents.x-k8s.io
      objectVersion: v1alpha1
      objectResource: sandboxclaims
      namespaceRange: {min: 1, max: {{$namespaces}}}
      successfulConditions: ["Ready=True"]
      failedConditions: []
      minDesiredObjectCount: {{MultiplyInt $burstSize $namespaces}}
      maxFailedObjectCount: 0
      timeout: 60m
      refreshInterval: 20ms

- name: Pause 2m to allow Prometheus to scrape the metrics
  measurements:
  - Identifier: WaitAfterTest
    Method: Sleep
    Params:
      duration: 2m

- name: Gather Results
  measurements:
  - Identifier: SandboxStartupLatency
    Method: PodStartupLatency
    Params:
      action: gather
      labelSelector: "app=agent-sandbox-load-test"
  - Identifier: SandboxClaimStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: gather
      enableViolations: true
  - Identifier: SandboxClaimControllerStartupLatency
    Method: GenericPrometheusQuery
    Params:
      action: gather
      enableViolations: true

- name: Delete Sandbox Claims
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: agent-claim
      objectTemplatePath: templates/cluster-loader-sandbox-claim.yaml

- name: Delete Sandbox Warm Pool
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: warmpool
      objectTemplatePath: templates/cluster-loader-warmpool.yaml

- name: Delete Sandbox Templates
  phases:
  - namespaceRange: {min: 1, max: {{$namespaces}}}
    replicasPerNamespace: 0
    tuningSet: BurstCreate
    objectBundle:
    - basename: template
      objectTemplatePath: templates/cluster-loader-sandbox-template.yaml
